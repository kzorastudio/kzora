name: Database Backup

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Backup Directory
        run: mkdir -p ./backups

      - name: Run pg_dump
        env:
          # Separate the URL and the Password for better handling of special characters
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          filename="backups/kzora_backup_$(date +'%Y-%m-%d_%H-%M-%S').sql"
          # Extract host, port, user and database from URL but use PGPASSWORD for auth
          # We use the -v flag for more info if it fails
          pg_dump "$DB_URL" > "$filename"
          # Compress the backup
          gzip "$filename"
          echo "BACKUP_PATH=${filename}.gz" >> $GITHUB_ENV

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v5
        with:
          name: supabase-db-backup
          path: ${{ env.BACKUP_PATH }}
          retention-days: 30 # Keep for 30 days
